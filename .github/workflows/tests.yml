name: tests

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: compile and test
        run: |
          echo "tests"
          pwd

          cd src
          clang -Oz -std=c2x -s -Wl,--gc-sections,--strip-all,-z,norelro -fno-unwind-tables -Wno-int-conversion -Wl,--entry=__start -fsanitize=address -fsanitize=undefined main.c -o toolkit
          
          ./toolkit || true

          ./toolkit --bench || true
          
          ./toolkit --setuid 12345 || true
          
          ./toolkit --getuid || true
          
          ./toolkit --getlist || true
          
          ./toolkit --sulog || true
          
          ./toolkit --setver || true
          
          ./toolkit --fkuname default default || true
          


